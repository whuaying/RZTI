<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RZTI 人格测试</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;700;900&display=swap');

:root {
  --paper: #E8DCC8;
  --paper-dark: #D4C4A8;
  --ink: #1A1610;
  --ink-light: #3D3528;
  --ink-muted: #6B5D4A;
  --accent-rust: #B84C32;
  --accent-teal: #2A7B6F;
  --card-bg: rgba(255,252,245,0.85);
  --border-draft: #9B8B72;
  --grid-line: rgba(107,93,74,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
  --font-pixel: 'Press Start 2P', cursive;
  --font-cn: 'Noto Sans SC', -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-cn);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.65;
}

/* Blueprint texture + grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 39px, var(--grid-line) 39px, var(--grid-line) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, var(--grid-line) 39px, var(--grid-line) 40px);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 70% 50% at 30% 20%, rgba(184,76,50,0.06), transparent),
    radial-gradient(ellipse 60% 40% at 75% 80%, rgba(42,123,111,0.05), transparent);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 580px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ---------- Progress Bar ---------- */
.progress-wrap {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--paper-dark);
  z-index: 100;
  border-bottom: 1px solid var(--border-draft);
}
.progress-bar {
  height: 100%;
  background: var(--ink);
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}

/* ---------- Cards ---------- */
.card {
  background: var(--card-bg);
  border: 2px solid var(--border-draft);
  border-radius: var(--radius);
  padding: 36px 28px;
  box-shadow:
    4px 4px 0 var(--border-draft),
    8px 8px 24px rgba(26,22,16,0.08);
  animation: fadeUp 0.5s ease;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: repeating-linear-gradient(
    90deg,
    var(--ink) 0, var(--ink) 8px,
    transparent 8px, transparent 16px
  );
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}
@keyframes scanline {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}

/* ---------- Landing ---------- */
.hero-icon {
  font-size: 56px;
  text-align: center;
  margin-bottom: 12px;
  animation: pulse 3s infinite;
  filter: grayscale(20%);
}
.hero-title {
  font-family: var(--font-pixel);
  font-size: 18px;
  text-align: center;
  letter-spacing: 2px;
  line-height: 1.8;
  margin-bottom: 6px;
  color: var(--ink);
}
.hero-sub {
  text-align: center;
  color: var(--ink-muted);
  font-size: 11px;
  font-family: var(--font-mono);
  letter-spacing: 3px;
  margin-bottom: 24px;
  text-transform: uppercase;
}
.hero-features {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 28px;
}
.hero-feat {
  border: 1.5px solid var(--border-draft);
  border-radius: 20px;
  padding: 7px 16px;
  font-size: 12px;
  color: var(--ink-light);
  font-family: var(--font-mono);
  font-weight: 600;
  letter-spacing: 0.5px;
  background: rgba(255,255,255,0.5);
}
.hero-feat span { margin-right: 5px; }

.btn {
  display: block;
  width: 100%;
  padding: 17px 24px;
  border: 2px solid var(--ink);
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s ease;
  font-family: var(--font-mono);
  background: var(--ink);
  color: var(--paper);
  text-transform: uppercase;
  box-shadow: 3px 3px 0 var(--ink-light);
}
.btn:hover {
  transform: translate(-2px,-2px);
  box-shadow: 5px 5px 0 var(--ink-light);
}
.btn:active {
  transform: translate(1px,1px);
  box-shadow: 1px 1px 0 var(--ink-light);
}
.btn-primary {
  background: var(--ink);
  color: var(--paper);
}
.btn-share {
  background: var(--accent-rust);
  border-color: var(--accent-rust);
  color: #fff;
  box-shadow: 3px 3px 0 #8B3826;
}
.btn-share:hover { box-shadow: 5px 5px 0 #8B3826; }

/* ---------- Question ---------- */
.question-num {
  font-size: 11px;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 14px;
  font-family: var(--font-mono);
  font-weight: 700;
}
.question-text {
  font-size: 20px;
  font-weight: 900;
  margin-bottom: 28px;
  line-height: 1.45;
  color: var(--ink);
  letter-spacing: -0.3px;
}
.options { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  background: rgba(255,255,255,0.6);
  border: 2px solid var(--border-draft);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  font-size: 15px;
  color: var(--ink-light);
  cursor: pointer;
  text-align: left;
  transition: all 0.2s ease;
  font-family: var(--font-cn);
  line-height: 1.55;
  position: relative;
}
.option-btn:hover {
  border-color: var(--ink);
  background: rgba(255,255,255,0.9);
  transform: translateX(4px);
}
.option-btn.selected {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--paper);
  box-shadow: 2px 2px 0 var(--ink-light);
}
.option-letter {
  display: inline-block;
  width: 26px; height: 26px;
  border-radius: 6px;
  background: var(--paper-dark);
  text-align: center;
  line-height: 26px;
  font-weight: 800;
  font-size: 12px;
  font-family: var(--font-mono);
  margin-right: 10px;
  flex-shrink: 0;
  color: var(--ink-muted);
  transition: all 0.15s;
}
.option-btn:hover .option-letter {
  background: var(--ink);
  color: var(--paper);
}
.option-btn.selected .option-letter {
  background: var(--paper);
  color: var(--ink);
}

/* ---------- Loading ---------- */
.loading-section {
  text-align: center;
  padding: 48px 20px;
}
.loading-spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--border-draft);
  border-top-color: var(--ink);
  border-radius: 0;
  /* square-ish spinner for hacker vibe */
  animation: spinSquare 1s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spinSquare { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 16px;
  font-weight: 800;
  color: var(--ink);
  font-family: var(--font-mono);
}
.loading-sub {
  font-size: 12px;
  color: var(--ink-muted);
  margin-top: 6px;
  font-family: var(--font-mono);
  letter-spacing: 1px;
}

/* ---------- Step Dots ---------- */
.step-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 18px;
}
.step-dot {
  width: 8px; height: 8px;
  border: 2px solid var(--border-draft);
  background: transparent;
  transition: all 0.3s ease;
  border-radius: 0;
}
.step-dot.active {
  background: var(--ink);
  border-color: var(--ink);
  width: 22px;
  border-radius: 1px;
}
.step-dot.done {
  background: var(--ink-muted);
  border-color: var(--ink-muted);
}

/* ---------- Result ---------- */
.result-wrap { animation: fadeUp 0.6s ease; }

.result-header {
  text-align: center;
  padding: 36px 20px 28px;
  border-radius: var(--radius) var(--radius) 0 0;
  position: relative;
  overflow: hidden;
  border-bottom: 2px solid var(--border-draft);
}
.result-header.blue   { background: linear-gradient(160deg, #2C3E50, #34495E); }
.result-header.red    { background: linear-gradient(160deg, #6B3328, #8B3E31); }
.result-header.green  { background: linear-gradient(160deg, #1E4D3E, #2A6B54); }
.result-header.purple { background: linear-gradient(160deg, #3D2355, #563066); }

.result-type-emoji { font-size: 100px; position: relative; z-index: 1; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); }
.result-type-name { font-size: 26px; font-weight: 900; margin: 8px 0 4px; position: relative; z-index: 1; color: #fff; letter-spacing: -0.5px; }
.result-type-tag { font-size: 11px; opacity: 0.7; position: relative; z-index: 1; letter-spacing: 2px; font-family: var(--font-mono); color: #ddd; }

.result-body {
  background: var(--card-bg);
  border: 2px solid var(--border-draft);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 28px;
}

.result-section { margin-bottom: 24px; }
.result-section:last-child { margin-bottom: 0; }
.result-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--ink-muted);
  margin-bottom: 10px;
  font-family: var(--font-mono);
  font-weight: 700;
}
.result-desc { font-size: 15px; line-height: 1.75; color: var(--ink-light); }

.result-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.result-stat {
  border: 1.5px solid var(--border-draft);
  border-radius: var(--radius-sm);
  padding: 14px 12px;
  text-align: center;
  background: rgba(255,255,255,0.4);
}
.result-stat-label { font-size: 10px; color: var(--ink-muted); margin-bottom: 4px; font-family: var(--font-mono); letter-spacing: 1px; text-transform: uppercase; }
.result-stat-value { font-size: 14px; font-weight: 800; color: var(--ink); }

/* dimension bars */
.dim-bars { display: flex; flex-direction: column; gap: 12px; }
.dim-row { display: flex; align-items: center; gap: 10px; }
.dim-left, .dim-right {
  font-size: 11px;
  width: 82px;
  flex-shrink: 0;
  color: var(--ink-muted);
  font-family: var(--font-mono);
}
.dim-right { text-align: right; }
.dim-left { text-align: right; }
.dim-bar-wrap {
  flex: 1;
  height: 10px;
  background: rgba(107,93,74,0.15);
  border: 1px solid var(--border-draft);
  border-radius: 0;
  overflow: hidden;
  position: relative;
}
.dim-bar-fill {
  height: 100%;
  border-radius: 0;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.dim-bar-fill.blue   { background: #2C3E50; }
.dim-bar-fill.red    { background: #8B3E31; }
.dim-bar-fill.green  { background: #2A6B54; }
.dim-bar-fill.purple { background: #563066; }
.dim-marker {
  position: absolute;
  top: -2px;
  height: 14px;
  width: 14px;
  background: var(--ink);
  border: 2px solid var(--paper);
  transform: translateX(-50%);
  transition: left 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 2px;
  box-shadow: 0 0 0 1px var(--border-draft);
}

/* teammate section */
.mate-grid { display: flex; flex-direction: column; gap: 8px; }
.mate-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border: 1.5px solid var(--border-draft);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.3);
  transition: background 0.15s;
}
.mate-item:hover { background: rgba(255,255,255,0.6); }
.mate-emoji { font-size: 24px; }
.mate-info { flex: 1; }
.mate-name { font-weight: 800; font-size: 14px; color: var(--ink); }
.mate-why { font-size: 12px; color: var(--ink-muted); }

/* share section */
.share-section {
  text-align: center;
  margin-top: 20px;
  padding-top: 18px;
  border-top: 2px dashed var(--border-draft);
}
.share-code {
  font-size: 13px;
  color: var(--ink-muted);
  margin-bottom: 14px;
  border: 1.5px solid var(--border-draft);
  display: inline-block;
  padding: 6px 18px;
  border-radius: 6px;
  letter-spacing: 2px;
  font-family: var(--font-mono);
  font-weight: 700;
  background: rgba(255,255,255,0.4);
}
.retake-btn {
  background: transparent;
  border: none;
  color: var(--ink-muted);
  font-size: 13px;
  cursor: pointer;
  padding: 8px;
  margin-top: 12px;
  font-family: var(--font-mono);
  text-decoration: underline;
  text-decoration-style: dashed;
  text-underline-offset: 3px;
}
.retake-btn:hover { color: var(--ink); }

/* ---------- Corner marks on card ---------- */
.corner-mark {
  position: absolute;
  width: 12px;
  height: 12px;
  border-color: var(--ink-muted);
  opacity: 0.4;
}
.corner-mark.tl { top: 6px; left: 6px; border-top: 2px solid; border-left: 2px solid; }
.corner-mark.tr { top: 6px; right: 6px; border-top: 2px solid; border-right: 2px solid; }
.corner-mark.bl { bottom: 6px; left: 6px; border-bottom: 2px solid; border-left: 2px solid; }
.corner-mark.br { bottom: 6px; right: 6px; border-bottom: 2px solid; border-right: 2px solid; }

/* ---------- Responsive ---------- */
@media (max-width: 420px) {
  .container { padding: 14px; }
  .card { padding: 28px 20px; }
  .hero-title { font-size: 14px; letter-spacing: 1px; }
  .question-text { font-size: 18px; }
  .result-type-name { font-size: 22px; }
  .result-grid { grid-template-columns: 1fr; }
}

/* ---------- Likert Scale ---------- */
.likert-scale {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 4px;
}
.likert-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  border: 2px solid var(--border-draft);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.6);
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: var(--font-cn);
  text-align: left;
  width: 100%;
}
.likert-btn:hover {
  border-color: var(--ink);
  background: rgba(255,255,255,0.9);
  transform: translateX(4px);
}
.likert-btn.selected {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--paper);
  box-shadow: 2px 2px 0 var(--ink-light);
}
.likert-dot {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--paper-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--ink-muted);
  flex-shrink: 0;
  transition: all 0.15s;
}
.likert-btn:hover .likert-dot {
  background: var(--ink);
  color: var(--paper);
}
.likert-btn.selected .likert-dot {
  background: var(--paper);
  color: var(--ink);
}
.likert-label {
  font-size: 14px;
  color: inherit;
  line-height: 1.4;
}

/* Dimension strength stars */
.dim-strength {
  font-size: 11px;
  color: var(--ink-muted);
  font-family: var(--font-mono);
  padding-left: 92px;
  margin-top: -6px;
  margin-bottom: 8px;
  letter-spacing: 1px;
}

/* ---------- Share Card Overlay ---------- */
#share-card-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
#share-card-overlay.active { display: flex; }
#share-card {
  width: 375px;
  background: #F5F0E8;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 12px 48px rgba(0,0,0,0.25);
  position: relative;
}
#share-card .sc-header {
  padding: 30px 24px 18px;
  text-align: center;
  color: var(--ink);
}
#share-card .sc-emoji { font-size: 64px; line-height: 1; }
#share-card .sc-name {
  font-size: 28px;
  font-weight: 900;
  margin: 12px 0 6px;
  font-family: var(--font-cn);
  color: var(--ink);
}
#share-card .sc-code {
  font-size: 13px;
  font-family: var(--font-mono);
  color: var(--ink-muted);
  letter-spacing: 3px;
  margin-bottom: 8px;
}
#share-card .sc-role {
  font-size: 15px;
  color: var(--accent-rust);
  font-weight: 700;
}
#share-card .sc-body {
  padding: 0 24px;
}
#share-card .sc-stat-row {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
  gap: 8px;
}
#share-card .sc-stat {
  flex: 1;
  text-align: center;
  background: rgba(255,255,255,0.5);
  border-radius: 8px;
  padding: 12px 6px;
}
#share-card .sc-stat-val {
  font-size: 20px;
  font-weight: 900;
  color: var(--ink);
}
#share-card .sc-stat-lbl {
  font-size: 10px;
  color: var(--ink-muted);
  margin-top: 2px;
}
#share-card .sc-section-title {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--ink-muted);
  letter-spacing: 2px;
  text-align: center;
  margin: 14px 0 8px;
}
#share-card .sc-dim-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  margin-bottom: 6px;
  color: var(--ink);
}
#share-card .sc-dim-label {
  width: 60px;
  text-align: right;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#share-card .sc-dim-bar-wrap {
  flex: 1;
  height: 8px;
  background: rgba(0,0,0,0.06);
  border-radius: 4px;
  overflow: hidden;
}
#share-card .sc-dim-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s;
}
#share-card .sc-dim-bar-fill.blue { background: #3B82C4; }
#share-card .sc-dim-bar-fill.red { background: #C45A3C; }
#share-card .sc-dim-bar-fill.green { background: #4A8B6B; }
#share-card .sc-dim-bar-fill.purple { background: #7B4EA5; }
#share-card .sc-dim-percent {
  width: 60px;
  text-align: left;
  font-weight: 700;
}
#share-card .sc-footer {
  text-align: center;
  padding: 18px 24px 22px;
  background: rgba(0,0,0,0.03);
  margin-top: 14px;
}
#share-card .sc-footer-title {
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--ink-muted);
  letter-spacing: 3px;
}
#share-card .sc-footer-url {
  font-size: 10px;
  color: var(--ink-muted);
  margin-top: 6px;
  font-family: var(--font-mono);
  opacity: 0.6;
}
#share-card-overlay .sc-btns {
  margin-top: 16px;
  display: flex;
  gap: 10px;
}
#share-card-overlay .sc-btn {
  padding: 10px 24px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-cn);
}
#share-card-overlay .sc-btn-download {
  background: var(--accent-rust);
  color: white;
}
#share-card-overlay .sc-btn-close {
  background: rgba(255,255,255,0.2);
  color: white;
  backdrop-filter: blur(4px);
}

</style>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>

<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

// ======================== QUESTION SELECTION ========================

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function selectQuestions() {
  let forcedChoice = [];
  const dims = ["R", "Z", "T", "I"];
  dims.forEach(dim => {
    const bank = questionBank[dim];
    bank.scenes.forEach(scene => {
      const q = scene.questions[Math.floor(Math.random() * scene.questions.length)];
      forcedChoice.push({
        ...q,
        dim: dim,
        dimLabel: bank.labels,
        scene: scene.name,
      });
    });
  });
  // Shuffle forced-choice
  forcedChoice = shuffle(forcedChoice);
  // Number them
  forcedChoice.forEach((q, i) => { q.id = i + 1; });
  
  // Build Likert questions in RZTI order
  let likertQs = [];
  dims.forEach(dim => {
    const bank = questionBank[dim];
    bank.likert.forEach((lq, li) => {
      likertQs.push({
        ...lq,
        dim: dim,
        dimLabel: bank.labels,
        isLikert: true,
        isNegative: lq.type === "negative",
        id: forcedChoice.length + li + 1 + (dims.indexOf(dim) * 2),
      });
    });
  });
  // Re-number likert consecutively
  likertQs.forEach((q, i) => { q.id = forcedChoice.length + i + 1; });
  
  return { forcedChoice, likert: likertQs };
}

function startTest() {
  // Select questions (random from bank)
  selectedQuestions = selectQuestions();

  state.currentQ = 0;
  state.answers = {};
  state.dimScores = { R: 0, Z: 0, T: 0, I: 0 };
  state.dimStrength = { R: 0, Z: 0, T: 0, I: 0 };

}


function renderQuestion() {
  const q = getCurrentQuestion();
  const total = getTotalQuestions();
  const isLikert = q.isLikert;
  
  // Progress: forced-choice 88%, likert 88-97%
  const forcedLen = selectedQuestions.forcedChoice.length;
  const phaseProgress = isLikert ? 88 : (state.currentQ / forcedLen) * 88;

  // If switching to Likert phase
  if (isLikert && currentPhase === 'forced') {
    currentPhase = 'likert';
  }

  let dotsHTML = '';
  for (let i = 0; i < total; i++) {
    if (i < state.currentQ) dotsHTML += '<div class="step-dot done"></div>';

    else dotsHTML += '<div class="step-dot"></div>';
  }

  const phaseLabel = isLikert ? '\u7a0b\u5ea6\u9898 \u00b7 ' + q.dimLabel.dimName : '\u8feb\u9009\u9898';

  let answerHTML = '';
  if (isLikert) {
    // Likert 5-point scale
    const labels = ['\u975e\u5e38\u4e0d\u540c\u610f', '\u6bd4\u8f83\u4e0d\u540c\u610f', '\u4e2d\u7acb', '\u6bd4\u8f83\u540c\u610f', '\u975e\u5e38\u540c\u610f'];
    answerHTML = '<div class="likert-scale">';
    for (let i = 1; i <= 5; i++) {
      const sel = state.answers[q.id] === i ? ' selected' : '';
      answerHTML += `
        <button class="likert-btn${sel}" onclick="selectLikert(${q.id}, ${i})">
          <span class="likert-dot">${i}</span>

    answerHTML += '</div>';
  } else {
    // Forced-choice A/B
    answerHTML = `

          <span class="option-letter">A</span>${q.a}
        </button>
        <button class="option-btn${state.answers[q.id] === 1 ? ' selected' : ''}" onclick="selectForced(${q.id}, 1)">
          <span class="option-letter">B</span>${q.b}
        </button>
      </div>`;
  }

  const hasAnswer = state.answers[q.id] !== undefined;
  const isLast = state.currentQ === total - 1;

  app.innerHTML = `
    <div class="card">
      <div class="corner-mark tl"></div>
      <div class="corner-mark tr"></div>
      <div class="step-dots">${dotsHTML}</div>
      <div class="question-num">

}

function selectForced(qId, optIdx) {
  state.answers[qId] = optIdx;
  render();
}

function selectLikert(qId, value) {
  state.answers[qId] = value;
  render();
}

function nextQuestion() {
  const q = getCurrentQuestion();
  if (state.answers[q.id] === undefined) return;

  const total = getTotalQuestions();
  if (state.currentQ < total - 1) {
    state.currentQ++;
    render();
  } else {
    calcScores();
    goToResult();
  }
}


function calcScores() {
  state.dimScores = { R: 0, Z: 0, T: 0, I: 0 };
  state.dimStrength = { R: 0, Z: 0, T: 0, I: 0 };
  const likertRaw = { R: [], Z: [], T: [], I: [] };

  // Forced-choice: A (+1 positive pole), B (-1 negative pole)
  selectedQuestions.forcedChoice.forEach(q => {
    const ansIdx = state.answers[q.id];
    if (ansIdx === undefined) return;
    // A=0 -> +1, B=1 -> -1
    state.dimScores[q.dim] += (ansIdx === 0 ? 1 : -1);
  });

  // Likert: positive -> raw 1-5; negative -> reverse score (6 - raw)
  selectedQuestions.likert.forEach(q => {
    const raw = state.answers[q.id];
    if (raw === undefined) return;
    const score = q.isNegative ? (6 - raw) : raw;
    likertRaw[q.dim].push(score);
  });

  // Strength index: average of 2 likert scores / 5 -> 0-1 range
  ['R', 'Z', 'T', 'I'].forEach(dim => {
    if (likertRaw[dim].length === 2) {
      const avg = (likertRaw[dim][0] + likertRaw[dim][1]) / 2;
      state.dimStrength[dim] = Math.round((avg / 5) * 100) / 100; // 0-1, 2 decimals
    }
  });
}

function getResultKey() {
  const scores = state.dimScores;
  // For 6 forced-choice questions per dimension, range is -6 to +6
  // Threshold: >= +2 -> positive, <= -2 -> negative, between -> balanced (use sign)
  const threshold = 2;
  const r = scores.R >= threshold ? 'B' : (scores.R <= -threshold ? 'M' : (scores.R >= 0 ? 'B' : 'M'));
  const z = scores.Z >= threshold ? 'A' : (scores.Z <= -threshold ? 'C' : (scores.Z >= 0 ? 'A' : 'C'));
  const t = scores.T >= threshold ? 'O' : (scores.T <= -threshold ? 'S' : (scores.T >= 0 ? 'O' : 'S'));
  const i = scores.I >= threshold ? 'F' : (scores.I <= -threshold ? 'P' : (scores.I >= 0 ? 'F' : 'P'));
  return `${r}${z}${t}${i}`;
}


function goToResult() {
  const key = getResultKey();
  state.resultType = typeMap[key];
  if (!state.resultType) {
    // Fallback: find the closest match
    const keys = Object.keys(typeMap);
    // Just use the first match that shares the most letters
    let best = keys[0];
    let bestScore = 0;
    keys.forEach(k => {
      let score = 0;
      for (let i = 0; i < 4; i++) {
        if (k[i] === key[i]) score++;
      }
      if (score > bestScore) { bestScore = score; best = k; }
    });
    state.resultType = typeMap[best];
  }
  showLoading();
}

  const strength = state.dimStrength;
  const dimLabelsShort = {
    R: { left: 'M(\u6570\u5b57\u6d3e)', right: 'B(\u7269\u7406\u6d3e)' },
    Z: { left: 'C(\u5fae\u89c2\u6d3e)', right: 'A(\u5b8f\u89c2\u6d3e)' },
    T: { left: 'S(\u72ec\u884c\u6d3e)', right: 'O(\u56e2\u961f\u6d3e)' },
    I: { left: 'P(\u5b8c\u7f8e\u6d3e)', right: 'F(\u52a1\u5b9e\u6d3e)' }
  };

  // \u6784\u5efa\u5206\u4eab\u5361\u5185\u5bb9
  let dimBarsHTML = '';
  ['R','Z','T','I'].forEach(dim => {
    const score = scores[dim];
    const maxAbs = 6;
    const pct = Math.round(((score + maxAbs) / (maxAbs * 2)) * 100);
    dimBarsHTML += `
      <div class="sc-dim-row">
        <div class="sc-dim-label">${dimLabelsShort[dim].left}</div>
        <div class="sc-dim-bar-wrap">
          <div class="sc-dim-bar-fill ${type.family}" style="width:${pct}%;"></div>
        </div>
        <div class="sc-dim-percent">${pct}%</div>
        <div class="sc-dim-label">${dimLabelsShort[dim].right}</div>
      </div>`;
  });

  // \u6784\u5efa\u6700\u4f73\u961f\u53cb\u6458\u8981
  const matesHTML = mates.map(m => 
    `<span style="margin-right:10px;">${m.emoji} ${m.name}</span>`
  ).join('');

  // \u521b\u5efa\u6216\u83b7\u53d6 overlay
  let overlay = document.getElementById('share-card-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'share-card-overlay';
    document.body.appendChild(overlay);
  }

  overlay.innerHTML = `
    <div id="share-card">
      <div class="sc-header">
        <div class="sc-emoji">${type.emoji}</div>
        <div class="sc-name">${type.name}</div>
        <div class="sc-code">${key}</div>
        <div class="sc-role">${type.role}</div>
      </div>
      <div class="sc-body">
        <div class="sc-stat-row">
          <div class="sc-stat">
            <div class="sc-stat-val">${type.rarity}%</div>
            <div class="sc-stat-lbl">\u4eba\u7fa4\u5360\u6bd4</div>
          </div>
          <div class="sc-stat">
            <div class="sc-stat-val" style="font-size:16px;">${type.role}</div>
            <div class="sc-stat-lbl">\u5929\u7136\u89d2\u8272</div>
          </div>
        </div>
        <div class="sc-section-title">维度解析</div>
        ${dimBarsHTML}
        <div class="sc-section-title">最佳队友</div>
        <div style="font-size:12px;color:var(--ink);text-align:center;line-height:1.8;">
          ${matesHTML}
        </div>
      </div>
      <div class="sc-footer">
        <div class="sc-footer-title">RZTI \u4eba\u683c\u6d4b\u8bd5</div>
        <div class="sc-footer-url">4e8221fcf045406b98e506dbb3ac82ec.app.codebuddy.work</div>
      </div>
    </div>
    <div class="sc-btns">
      <button class="sc-btn sc-btn-download" onclick="downloadShareCard()">\ud83d\udcf8 \u4fdd\u5b58\u56fe\u7247</button>
      <button class="sc-btn sc-btn-close" onclick="closeShareCard()">\u5173\u95ed</button>
    </div>
  `;

  overlay.classList.add('active');

  // \u9884\u52a0\u8f7d html2canvas \u5982\u679c\u8fd8\u6ca1\u6709
  if (typeof html2canvas === 'undefined') {
    const script = document.createElement('script');
    script.src = 'https://html2canvas.hertzen.com/dist/html2canvas.min.js';
    script.onload = () => { /* loaded */ };
    document.head.appendChild(script);
  }
}

function closeShareCard() {
  const overlay = document.getElementById('share-card-overlay');
  if (overlay) overlay.classList.remove('active');
}

document.addEventListener('click', function(e) {
  if (e.target.id === 'share-card-overlay') {
    closeShareCard();
  }
});

function downloadShareCard() {
  const card = document.getElementById('share-card');
  if (!card) return;
  
  if (typeof html2canvas === 'undefined') {
    // \u52a0\u8f7d html2canvas \u540e\u91cd\u8bd5
    const script = document.createElement('script');
    script.src = 'https://html2canvas.hertzen.com/dist/html2canvas.min.js';
    script.onload = () => downloadShareCard();
    document.head.appendChild(script);
    return;
  }

  const btn = document.querySelector('.sc-btn-download');
  if (btn) btn.textContent = '\u751f\u6210\u4e2d...';

  html2canvas(card, {
    scale: 2,
    backgroundColor: '#F5F0E8',
    useCORS: true,
    allowTaint: true,
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = `RZTI_${getResultKey()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    if (btn) btn.textContent = '\u2705 \u5df2\u4fdd\u5b58';
    setTimeout(() => {
      if (btn) btn.textContent = '\ud83d\udcf8 \u4fdd\u5b58\u56fe\u7247';
    }, 2000);
  }).catch(err => {
    console.error('html2canvas error:', err);
    if (btn) btn.textContent = '\u274c \u5931\u8d25\uff0c\u8bf7\u91cd\u8bd5';
    setTimeout(() => {
      if (btn) btn.textContent = '\ud83d\udcf8 \u4fdd\u5b58\u56fe\u7247';
    }, 2000);
  });
}

function resetTest() {
  selectedQuestions = null;
  allQuestions = null;
  currentPhase = null;
  state = {
    step: 'landing',
    currentQ: 0,
    answers: {},
    dimScores: { R: 0, Z: 0, T: 0, I: 0 },
    dimStrength: { R: 0, Z: 0, T: 0, I: 0 },
    resultType: null,
  };
  updateProgress(0);
  render();
}

// Init
render();

</script>
</body>
</html>
